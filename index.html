<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Даурен мен Алинаның үйлену тойы</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">
        <section id="rsvp" class="section glass-card">
            <h2 class="section-title">Тойға қатысуыңызды растаңыз:</h2>
            <form id="rsvp-form" class="rsvp-form">
                <div class="form-group">
                    <label for="guest-name" class="form-label">Аты-жөніңіз:</label>
                    <p class="form-input-desc">Жұбайыңызбен келсеңіз, есімдеріңізді бірге жаза кетіңіз</p>
                    <input type="text" id="guest-name" class="form-input" placeholder="Атыңыз және Жұбайыңыздың аты"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label">Жауабыңыз:</label>
                    <div class="radio-options">
                        <label class="radio-card">
                            <input type="radio" name="attendance" value="Әрине, келемін" required checked>
                            <div class="radio-custom-card">
                                <i class="fas fa-check-circle"></i>
                                <span>Әрине, келемін</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="attendance" value="Жұбайыммен келемін">
                            <div class="radio-custom-card">
                                <i class="fas fa-user-friends"></i>
                                <span>Жұбайыммен келемін</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="attendance" value="Келе алмаймын">
                            <div class="radio-custom-card">
                                <i class="fas fa-times-circle"></i>
                                <span>Келе алмаймын</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="rsvp-submit-btn">Жіберу</button>
            </form>
            <div id="rsvp-success" class="rsvp-success-message">
                <i class="fas fa-heart-circle-check"></i>
                <h3>Рахмет!</h3>
                <p>Жауабыңыз сәтті қабылданды.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
